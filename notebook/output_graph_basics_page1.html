            height: auto;

        }

            font-size: 14px;
            line-height: 1.6;
            height: 80vh;
            overflow-y: auto;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 12px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 6px;
            text-align: left;
        }
        th {
            font-weight: bold;
        }
    </style>
